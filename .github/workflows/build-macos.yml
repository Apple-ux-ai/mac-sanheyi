# 在 macOS Runner 上打 x64 + arm64 便携 ZIP（无需代码签名时可直出）
# 仓库结构：根目录下为子目录 sanheyi/ 时保持默认；若应用代码在仓库根目录，请删除 job 中的 working-directory。

name: Build macOS portable ZIP

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sanheyi

jobs:
  mac-zip:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            sanheyi/package-lock.json
            sanheyi/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Python backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python build_backend.py

      - name: Build Electron mac zip
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac zip

      - name: Upload portable artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-portable-zip
          path: sanheyi/release_unpacked/portable/*.zip
          if-no-files-found: error
