# 分别产出 Apple Silicon (arm64) 与 Intel (x64) 便携 ZIP。
# PyInstaller 后端必须与 Electron 架构一致，故使用两种 Runner，不能在同一台 ARM 上交叉打 x64 后端。
# Intel Runner 标签见：https://github.com/actions/runner-images/blob/main/README.md

name: Build macOS portable ZIP

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: sanheyi

jobs:
  mac-zip:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-latest
            arch: arm64
            label: Apple-Silicon
          - runs-on: macos-15-intel
            arch: x64
            label: Intel
    runs-on: ${{ matrix.runs-on }}
    name: mac-zip (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            sanheyi/package-lock.json
            sanheyi/frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Build Python backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt
          python build_backend.py

      - name: Build Electron mac zip (${{ matrix.arch }})
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --mac zip --${{ matrix.arch }}

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-portable-${{ matrix.arch }}
          path: sanheyi/release_unpacked/portable/*.zip
          if-no-files-found: error
